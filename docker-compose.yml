version: "3.8"

services:
  api:
    build: .
    image: mining-risk-agent:latest
    container_name: mining_risk_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
    environment:
      - PYTHONPATH=/app
    command: uvicorn mining_risk_agent.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: .
    image: mining-risk-agent:latest
    container_name: mining_risk_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./frontend:/app/mining_risk_agent/frontend
      - ./knowledge_base:/app/knowledge_base
    environment:
      - PYTHONPATH=/app
    command: streamlit run mining_risk_agent/frontend/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
